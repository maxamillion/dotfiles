version: 1.0.0
title: "Dual-Model Iterative Code Review"
description: >
  Orchestrates an iterative code review workflow between Claude Sonnet 4.6 and
  Gemini 3.1 Pro Preview. Opus 4.6 handles strategic planning and final sign-off.
  Models alternate between implementing and reviewing code across up to 10 turns
  until they agree the code meets the specified quality standard.

parameters:
  - key: task_description
    input_type: string
    requirement: required
    description: "The coding task to perform. Be as specific as possible."
  - key: project_path
    input_type: string
    requirement: required
    description: "Absolute path to the project directory where code will be written."
  - key: max_turns
    input_type: number
    requirement: optional
    default: 10
    description: "Maximum number of write/review cycles (1-10). Each turn = one implementation + one review."
  - key: quality_standard
    input_type: select
    requirement: optional
    default: "production"
    description: "Quality bar for the code review cycle."
    options:
      - "prototype"
      - "production"
      - "critical"

settings:
  goose_provider: gcp_vertex_ai
  goose_model: claude-sonnet-4-6
  temperature: 0.3
  max_turns: 100

extensions:
  - type: builtin
    name: developer

instructions: |
  You are an orchestrator managing an iterative code development and review workflow
  between two AI models: Claude Sonnet 4.6 and Gemini 3.1 Pro Preview. Claude Opus 4.6
  handles strategic planning at the start and final sign-off at the end.

  ## Your Role
  You coordinate the workflow, manage state, and decide when to proceed or terminate.
  You do NOT write code or review code yourself -- you delegate to subrecipes.

  ## Setup
  1. Create the collaboration workspace directory at `{{ project_path }}/.goose-collab/`
     with subdirectories `changes/` and `reviews/`.
  2. Write the task description to `{{ project_path }}/.goose-collab/task.md`:
     ```
     # Task Description
     {{ task_description }}

     ## Quality Standard: {{ quality_standard }}
     ## Max Turns: {{ max_turns }}
     ```
  3. Initialize `{{ project_path }}/.goose-collab/status.json`:
     ```json
     {
       "current_turn": 0,
       "max_turns": {{ max_turns }},
       "quality_standard": "{{ quality_standard }}",
       "last_implementer": null,
       "last_reviewer": null,
       "approved": false,
       "blocking_issues": 0,
       "non_blocking_suggestions": 0,
       "stagnation_count": 0
     }
     ```

  ## Phase 0: Strategic Planning
  Call the `create_plan` subrecipe. It will read the task from `.goose-collab/task.md`,
  analyze the project, and write a detailed implementation plan to
  `{{ project_path }}/.goose-collab/plan.md`.

  After the plan subrecipe completes, verify that `plan.md` was created. If it was not,
  report the error and stop.

  ## Phase 1-{{ max_turns }}: Iterative Write/Review Loop
  Execute up to {{ max_turns }} turns. Each turn consists of one implementation step
  and one review step.

  ### Turn Alternation Pattern
  - **Odd turns** (1, 3, 5, ...): Gemini implements, Sonnet reviews
  - **Even turns** (2, 4, 6, ...): Sonnet implements, Gemini reviews

  ### For each turn N:
  1. Update `status.json` to set `current_turn` to N.
  2. **Implementation step:**
     - If N is odd: call `implement_with_gemini`
     - If N is even: call `implement_with_sonnet`
     - The subrecipe will read the plan, previous review feedback, and write code.
     - It will create `{{ project_path }}/.goose-collab/changes/turn-N.md`.
  3. **Review step:**
     - If N is odd: call `review_with_sonnet`
     - If N is even: call `review_with_gemini`
     - The subrecipe will review the code and write feedback.
     - It will create `{{ project_path }}/.goose-collab/reviews/turn-N.md`.
     - It will update `status.json` with the review outcome.
  4. **After the review completes**, read `status.json` and the review file.
  5. **Termination check:**
     - If `approved` is `true` and `blocking_issues` is 0: exit the loop, proceed to final review.
     - If the same blocking issues appear in 2 consecutive reviews with no progress:
       increment `stagnation_count`. If `stagnation_count` >= 2, exit the loop and
       note the stagnation in the final summary.
     - If N equals {{ max_turns }}: exit the loop.
     - Otherwise: continue to the next turn.

  ## Phase Final: Opus Sign-Off
  Call the `final_review` subrecipe. Opus will compare the implementation against the
  original plan, verify intent alignment, and write its assessment to
  `{{ project_path }}/.goose-collab/final-review.md`.

  ## Presenting Results
  After the final review completes, read `final-review.md` and all review files.
  Present a summary to the user that includes:
  1. **Task**: The original task description.
  2. **Turns completed**: How many write/review cycles ran.
  3. **Final status**: Whether the code was approved, had remaining issues, or stagnated.
  4. **Opus assessment**: Key points from the final Opus review.
  5. **Files created/modified**: List of all files that were created or changed.
  6. **Remaining issues**: Any blocking or non-blocking items still open.
  7. **Collaboration directory**: Note that full review history is available in
     `{{ project_path }}/.goose-collab/`.

  ## Important Rules
  - NEVER write code or perform reviews yourself. Always delegate to the appropriate subrecipe.
  - ALWAYS update status.json before and after each subrecipe call.
  - If a subrecipe fails or produces no output, log the error and attempt to continue
    with the next step. Do not silently skip failures.
  - Keep your own output minimal -- your job is coordination, not commentary.

prompt: |
  Begin the dual-model iterative code review workflow.

  Task: {{ task_description }}
  Project path: {{ project_path }}
  Max turns: {{ max_turns }}
  Quality standard: {{ quality_standard }}

  Start by setting up the collaboration workspace, then call the planning subrecipe.

sub_recipes:
  - name: "create_plan"
    path: "./subrecipes/create-plan.yaml"
    values:
      project_path: "{{ project_path }}"

  - name: "implement_with_sonnet"
    path: "./subrecipes/implement-with-sonnet.yaml"
    values:
      project_path: "{{ project_path }}"

  - name: "implement_with_gemini"
    path: "./subrecipes/implement-with-gemini.yaml"
    values:
      project_path: "{{ project_path }}"

  - name: "review_with_sonnet"
    path: "./subrecipes/review-with-sonnet.yaml"
    values:
      project_path: "{{ project_path }}"

  - name: "review_with_gemini"
    path: "./subrecipes/review-with-gemini.yaml"
    values:
      project_path: "{{ project_path }}"

  - name: "final_review"
    path: "./subrecipes/final-review.yaml"
    values:
      project_path: "{{ project_path }}"
